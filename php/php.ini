; Custom PHP configuration for local development

display_errors = On
display_startup_errors = On
error_reporting = E_ALL

max_execution_time = 300
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M

date.timezone = UTC

; --- OPCache ---
; Cached compiled PHP bytecode in memory so files aren't recompiled on every request.
; This is the single biggest PHP performance improvement for Wordpress.

opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 15000
opcache.enable_file_validate_timestamps = 1
opcache.revalidate_freq = 1
opcache.save_comments = 1

; --- Realpath cache ---
; Caches filesystem path lookups - Wordpress loads hundreds of files per request
realpath_cache_size = 4096k
realpath_cache_ttl = 600