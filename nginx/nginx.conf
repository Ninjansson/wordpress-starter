events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 64M;

    # Gzip - compresses HTML, CSS, JS, JSON, SVG before sending to the browser.
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;    
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml font/woff2;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root  /var/www/html;
        index index.php index.html index.htm;

        error_page 404 500 502 503 504 /index.php;

        # Static assets - tell the browser to cache them for 1 month
        # Wordpress append ?ver= query strings so cache busting works automatically.
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 1m;
            add_header Cache-Control "public";
            access_log off;
            try_files $uri =404;
        }

        # Static files and WordPress pretty permalinks
        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        # PHP via WordPress FPM
        location ~ \.php$ {
            fastcgi_pass   wordpress:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
            include        fastcgi_params;
            fastcgi_read_timeout 300;
        }

        # Block access to sensitive files
        location ~ /\.(ht|git|env) {
            deny all;
        }
    }
}
